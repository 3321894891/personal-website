<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摄影作品 · 光影集</title>
    <style>
        /* 样式完全不变，省略... 实际使用时请保留完整样式 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #0b0b1a; color: #f0f0f5; font-family: 'Inter', -apple-system, sans-serif; padding: 40px 20px 60px; }
        .container { max-width: 1280px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 2.4rem; font-weight: 700; background: linear-gradient(135deg, #6c5ce7, #00cec9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 50px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); color: #a0a0c0; text-decoration: none; transition: 0.3s; font-weight: 500; }
        .back-link:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .gallery-item { border-radius: 16px; overflow: hidden; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; cursor: pointer; position: relative; aspect-ratio: 1 / 1; }
        .gallery-item:hover { transform: scale(1.02); border-color: rgba(108, 92, 231, 0.4); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gallery-item .filename { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); font-size: 0.8rem; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; backdrop-filter: blur(4px); }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; padding: 40px; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 80%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); object-fit: contain; }
        .lightbox .close { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; color: #fff; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .lightbox .close:hover { opacity: 1; transform: rotate(90deg); }
        .lightbox .caption { margin-top: 20px; color: #ccc; font-size: 0.95rem; text-align: center; max-width: 80%; }
        @media (max-width: 600px) { .header h1 { font-size: 1.8rem; } .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } .lightbox img { max-height: 70%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 摄影 · 光影集</h1>
            <a href="index.html" class="back-link">← 返回作品集</a>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>
    <div class="lightbox" id="lightbox">
        <span class="close" id="closeLightbox">&times;</span>
        <img id="lightboxImg" src="" alt="摄影作品" />
        <div class="caption" id="lightboxCaption"></div>
    </div>

    <script>
        const fileNames = [
            "11c4034607e0db55eab5de2957f98321.png",
            "32a9b1b9e3da03e9922dbb8b18754da1.jpg",
            "370f41a1b3d9280850c61c52438a0053.png",
            "3aec54a9cb4c7da80538549b9922fce8.jpg",
            "DSC_0404.JPG",
            "DSC_0614.JPG",
            "DSC_1216.JPG",
            "DSC_1409.JPG",
            "ba416a8b073f0d9a13750b5029dda9eb.png",
            "d1a66ffab786436d9c9d73c8df5b255f.jpg",
            "deff46cc7f763dba49bd8effd4699fed.jpg",
            "ff9dc2323fb5e19a0822074deea92025.png"
        ];

        const galleryGrid = document.getElementById('galleryGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const closeLightbox = document.getElementById('closeLightbox');

        // ★★★ 关键修改：使用相对路径，指向同级的 images 文件夹 ★★★
        const imagePath = './images/';

        function renderGallery() {
            galleryGrid.innerHTML = fileNames.map(name => `
                <div class="gallery-item" data-src="${imagePath}${name}" data-name="${name}">
                    <img src="${imagePath}${name}" alt="${name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23333%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23666%22 font-family=%22sans-serif%22 font-size=%2214%22%3E%F0%9F%93%B7%20缺失%3C/text%3E%3C/svg%3E'" />
                    <div class="filename">${name}</div>
                </div>
            `).join('');

            document.querySelectorAll('.gallery-item').forEach(item => {
                item.addEventListener('click', function() {
                    const src = this.dataset.src;
                    const name = this.dataset.name;
                    lightboxImg.src = src;
                    lightboxCaption.textContent = name;
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            });
        }

        function closeLightboxFn() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        closeLightbox.addEventListener('click', closeLightboxFn);
        lightbox.addEventListener('click', function(e) {
            if (e.target === this) closeLightboxFn();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightboxFn();
        });

        renderGallery();
    </script>
</body>
</html>
