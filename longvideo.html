<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>长视频 · 叙事影像</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b1a;
            color: #f0f0f5;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 40px 20px 60px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            color: #a0a0c0;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            transform: translateY(-2px);
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .video-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .video-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 92, 231, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .video-card .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .video-card .card-image i {
            opacity: 0.6;
        }
        .video-card .card-body {
            padding: 20px 22px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .video-card .card-body h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .video-card .card-body .role {
            font-size: 0.8rem;
            color: #00cec9;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .video-card .card-body p {
            font-size: 0.9rem;
            color: #a0a0c0;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 14px;
        }
        .video-card .card-body .watch-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            align-self: flex-start;
            margin-top: auto;
        }
        .video-card .card-body .watch-link:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(108,92,231,0.3);
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 长视频 · 叙事影像</h1>
            <a href="index.html" class="back-link">← 返回作品集</a>
        </div>

        <div class="video-grid" id="videoGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>
    </div>

    <script>
        const videos = [
            {
                title: "《匆匆》",
                role: "担任出镜和剪辑",
                desc: "记录时光流逝中的细腻情感，以第一人称视角讲述关于成长与告别的故事。",
                link: "https://www.xinpianchang.com/a13722801?token=A9MTz4bqjvp3MJlhg1VQpBQ&channel=copyLink&from=webShare",
                icon: "fa-user"
            },
            {
                title: "《夜阑晨光》",
                role: "担任镜头设计和剪辑",
                desc: "捕捉深夜与晨曦的光影叙事，用镜头语言探索寂静与希望的交界。",
                link: "https://www.xinpianchang.com/a13722793?token=1a30kO2HD0jG2SkN9e2oR1gH&channel=copyLink&from=webShare",
                icon: "fa-sun"
            },
            {
                title: "《短视频速成训练营》",
                role: "担任创意指导",
                desc: "探索短视频创作的快速方法论，从创意构思到落地执行的完整案例。",
                link: "https://www.xinpianchang.com/a13729115?from=webShare&channel=copyLink&token=V4wVA3mMnZ13UZCBfgW3Pp",
                icon: "fa-rocket"
            }
        ];

        const grid = document.getElementById('videoGrid');

        grid.innerHTML = videos.map(v => `
            <div class="video-card" onclick="window.open('${v.link}', '_blank')">
                <div class="card-image">
                    <i class="fas ${v.icon}"></i>
                </div>
                <div class="card-body">
                    <h3>${v.title}</h3>
                    <div class="role">${v.role}</div>
                    <p>${v.desc}</p>
                    <a href="${v.link}" target="_blank" class="watch-link" onclick="event.stopPropagation();">
                        <i class="fas fa-play"></i> 观看作品
                    </a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
