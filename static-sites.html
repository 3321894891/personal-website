<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>静态网站 · 工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b1a;
            color: #f0f0f5;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 40px 20px 60px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            color: #a0a0c0;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            transform: translateY(-2px);
        }
        .site-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .site-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .site-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 92, 231, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .site-card .card-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .site-card .card-image i {
            opacity: 0.6;
        }
        .site-card .card-body {
            padding: 20px 22px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .site-card .card-body h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .site-card .card-body p {
            font-size: 0.9rem;
            color: #a0a0c0;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 14px;
        }
        .site-card .card-body .visit-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            align-self: flex-start;
            margin-top: auto;
        }
        .site-card .card-body .visit-link:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(108,92,231,0.3);
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .site-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💻 静态网站 · 工具集</h1>
            <a href="index.html" class="back-link">← 返回作品集</a>
        </div>

        <div class="site-grid" id="siteGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>
    </div>

    <script>
        const sites = [
            {
                title: "每日任务打卡系统",
                desc: "一个帮助养成习惯的打卡工具，简洁实用，适合日常任务管理。",
                link: "https://3321894891.github.io/jiaomu/",
                icon: "fa-check-circle"
            },
            {
                title: "专注番茄钟",
                desc: "亲手打造的番茄钟工具，助力高效专注，提升工作效率。",
                link: "https://3321894891.github.io/fanqiezhong/",
                icon: "fa-clock"
            }
        ];

        const grid = document.getElementById('siteGrid');

        grid.innerHTML = sites.map(s => `
            <div class="site-card" onclick="window.open('${s.link}', '_blank')">
                <div class="card-image">
                    <i class="fas ${s.icon}"></i>
                </div>
                <div class="card-body">
                    <h3>${s.title}</h3>
                    <p>${s.desc}</p>
                    <a href="${s.link}" target="_blank" class="visit-link" onclick="event.stopPropagation();">
                        <i class="fas fa-external-link-alt"></i> 访问网站
                    </a>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
